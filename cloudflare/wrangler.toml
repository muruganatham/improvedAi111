# Cloudflare Worker Configuration for PR Preview Routing
# See: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "mako-pr-router"
main = "worker.js"
compatibility_date = "2024-01-01"

# Routes - routes all pr-*.mako.ai traffic through this worker
routes = [{ pattern = "pr-*.mako.ai/*", zone_name = "mako.ai" }]

# KV Namespace binding
[[kv_namespaces]]
binding = "MAKO_PR_DEPLOYMENTS"
id = "4b7600c488094db88540a401e8fbbce1"
